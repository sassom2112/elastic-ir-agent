# ES|QL tool definitions for Elastic Agent Builder
# Each entry becomes a callable MCP tool for the Gemini agent
#
# Parameter syntax:
#   Agent Builder UI / MCP: ?param_name, time_window is INTEGER HOURS
#   Local agent (Python):   {param_name} string like "24h", "10y"
#
# time_window examples for MCP calls:
#   24       = 24 hours
#   168      = 7 days
#   720      = 30 days
#   8760     = 1 year
#   87600    = 10 years (use this for historical dataset)

tools:

  - name: failed_logins_by_host
    description: >
      Count failed login attempts grouped by host. Detects brute force and
      credential stuffing. time_window is in hours (e.g. 24 = 1 day, 87600 = 10 years).
    parameters:
      - name: time_window
        type: string
        default: "24"
        description: "Hours to look back (integer). Use 87600 for full historical dataset."
      - name: threshold
        type: string
        default: "5"
        description: "Minimum number of failures to include in results"
    esql: |
      FROM ir-events
      | EVAL diff_hours = DATE_DIFF("hours", @timestamp, NOW())
      | WHERE diff_hours <= TO_INTEGER(?time_window)
      | WHERE event.code == "4625" OR event.action == "logon-failed"
      | STATS failure_count = COUNT(*) BY host.name, user.name
      | WHERE failure_count >= TO_INTEGER(?threshold)
      | SORT failure_count DESC

  - name: lateral_movement_detection
    description: >
      Find lateral movement: users logging into multiple hosts, remote service
      creation, SMB access. time_window is in hours.
    parameters:
      - name: time_window
        type: string
        default: "24"
        description: "Hours to look back (integer). Use 87600 for full historical dataset."
    esql: |
      FROM ir-events
      | EVAL diff_hours = DATE_DIFF("hours", @timestamp, NOW())
      | WHERE diff_hours <= TO_INTEGER(?time_window)
      | WHERE event.code IN ("4624", "7045", "5140", "4648") AND event.outcome == "success"
      | STATS host_count = COUNT_DISTINCT(host.name) BY user.name, network.source.ip
      | WHERE host_count > 1
      | SORT host_count DESC

  - name: credential_access_events
    description: >
      Surface credential dumping events: LSASS access (event 4656), SAM reads,
      and known dumping tool signatures. time_window is in hours.
    parameters:
      - name: time_window
        type: string
        default: "24"
        description: "Hours to look back (integer). Use 87600 for full historical dataset."
    esql: |
      FROM ir-events
      | EVAL diff_hours = DATE_DIFF("hours", @timestamp, NOW())
      | WHERE diff_hours <= TO_INTEGER(?time_window)
      | WHERE event.code IN ("4656", "4663", "4704")
        OR (process.name IN ("mimikatz.exe", "procdump.exe", "lsass.exe")
            AND event.category == "process")
      | KEEP @timestamp, host.name, user.name, process.name,
             process.command_line, event.code, message
      | SORT @timestamp DESC
      | LIMIT 100

  - name: attack_timeline
    description: >
      Build a chronological event timeline for a host. Use * for all hosts.
      time_window is in hours.
    parameters:
      - name: host_name
        type: string
        default: "*"
        description: "Hostname to investigate. Use * for all hosts."
      - name: time_window
        type: string
        default: "24"
        description: "Hours to look back (integer). Use 87600 for full historical dataset."
    esql: |
      FROM ir-events
      | EVAL diff_hours = DATE_DIFF("hours", @timestamp, NOW())
      | WHERE diff_hours <= TO_INTEGER(?time_window)
      | WHERE host.name == ?host_name OR ?host_name == "*"
      | KEEP @timestamp, host.name, user.name, event.code, event.action,
             event.category, process.name, message, threat.technique.id
      | SORT @timestamp ASC

  - name: unique_hosts_by_technique
    description: >
      Count hosts affected by each MITRE ATT&CK technique. Shows blast radius.
      time_window is in hours.
    parameters:
      - name: time_window
        type: string
        default: "168"
        description: "Hours to look back (integer). Use 87600 for full historical dataset."
    esql: |
      FROM ir-events
      | EVAL diff_hours = DATE_DIFF("hours", @timestamp, NOW())
      | WHERE diff_hours <= TO_INTEGER(?time_window)
      | WHERE threat.technique.id IS NOT NULL
      | STATS affected_hosts = COUNT_DISTINCT(host.name),
               event_count = COUNT(*)
        BY threat.technique.id, threat.technique.name, threat.tactic.name
      | SORT affected_hosts DESC

  - name: suspicious_process_execution
    description: >
      Find LOLBin abuse, encoded PowerShell, and processes from unusual parents.
      time_window is in hours.
    parameters:
      - name: time_window
        type: string
        default: "24"
        description: "Hours to look back (integer). Use 87600 for full historical dataset."
    esql: |
      FROM ir-events
      | EVAL diff_hours = DATE_DIFF("hours", @timestamp, NOW())
      | WHERE diff_hours <= TO_INTEGER(?time_window)
      | WHERE event.category == "process"
        AND (
          process.name IN ("powershell.exe", "cmd.exe", "wscript.exe",
                           "mshta.exe", "rundll32.exe", "regsvr32.exe",
                           "certutil.exe", "bitsadmin.exe")
          OR process.command_line LIKE "*-EncodedCommand*"
          OR process.command_line LIKE "*-enc *"
        )
      | KEEP @timestamp, host.name, user.name, process.name,
             process.command_line, process.parent.name
      | SORT @timestamp DESC
      | LIMIT 200
